site_name: ARC Technical Documentation
site_url: https://adguzr.github.io/arc-docs/
repo_url: https://github.com/adguzr/arc-docs
repo_name: adguzr/arc-docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - content.action.edit

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:arc.support@ubc.ca
      name: Contact ARC support

copyright: >
  &copy; 2025 UBC Advanced Research Computing &nbsp;|&nbsp;
  <a href="mailto:arc.support@ubc.ca">arc.support@ubc.ca</a>

markdown_extensions:
  - md_in_html
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search
  - tags
  - awesome-pages
